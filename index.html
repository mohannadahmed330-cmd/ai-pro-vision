<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8K Pro Vision - Stable Multi-Ref</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background: #020205;
            color: #ffffff;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(10, 10, 20, 0.95);
            backdrop-filter: blur(40px);
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        .turbo-gradient {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
            box-shadow: 0 0 20px rgba(37, 99, 235, 0.4);
        }

        .result-card {
            animation: slideUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .batch-btn {
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .batch-btn.active {
            background: #3b82f6;
            border-color: #3b82f6;
            color: white;
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }

        .img-slot {
            position: relative;
            aspect-ratio: 1;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            overflow: hidden;
            background: rgba(0,0,0,0.3);
        }

        .pro-input:focus {
            border-color: #3b82f6 !important;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <header class="p-5 border-b border-blue-900/30 glass-panel sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 turbo-gradient rounded-xl flex items-center justify-center">
                    <i class="fas fa-bolt text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black text-white">PRO <span class="text-blue-500">VISION</span> 8K</h1>
                    <p class="text-[8px] text-blue-400 font-bold uppercase tracking-[2px]">Multi-Ref Stable Engine v6</p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-4 space-y-6">
            <div class="glass-panel p-6 rounded-[2rem] space-y-6 border border-white/5 shadow-2xl">
                <div class="flex justify-between items-center">
                    <h2 class="text-[10px] font-black text-blue-400 uppercase tracking-widest">الصور المرجعية (حتى 4)</h2>
                    <span id="imgCount" class="text-[10px] bg-blue-600/20 text-blue-400 px-2 py-1 rounded">0/4</span>
                </div>

                <div class="grid grid-cols-2 gap-3" id="previewGrid">
                    <label for="imageUpload" class="img-slot flex flex-col items-center justify-center cursor-pointer hover:bg-white/5 transition-all border-dashed border-2 border-white/10">
                        <i class="fas fa-plus text-gray-600 text-lg"></i>
                        <span class="text-[9px] text-gray-500 mt-1">إضافة صورة</span>
                    </label>
                </div>
                
                <input type="file" id="imageUpload" class="hidden" accept="image/*" multiple>
                
                <button id="analyzeBtn" class="w-full py-4 bg-white/5 hover:bg-white/10 text-white rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 border border-white/10">
                    <i class="fas fa-brain"></i> إنشاء وصف احترافي للصور
                </button>
            </div>

            <div class="glass-panel p-5 rounded-[1.5rem] border border-white/5">
                <h3 class="text-[9px] font-black text-gray-500 uppercase tracking-widest mb-4 text-center">عدد الصور الناتج</h3>
                <div class="grid grid-cols-3 gap-2">
                    <button class="batch-btn py-3 rounded-lg text-xs font-bold active" data-count="1">1</button>
                    <button class="batch-btn py-3 rounded-lg text-xs font-bold" data-count="2">2</button>
                    <button class="batch-btn py-3 rounded-lg text-xs font-bold" data-count="3">3</button>
                    <button class="batch-btn py-3 rounded-lg text-xs font-bold" data-count="4">4</button>
                    <button class="batch-btn py-3 rounded-lg text-xs font-bold" data-count="5">5</button>
                    <button class="batch-btn py-3 rounded-lg text-xs font-bold" data-count="6">6</button>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8 space-y-6">
            <div class="glass-panel p-6 rounded-[2rem] border border-white/5">
                <div class="space-y-4">
                    <div class="flex justify-between items-center px-1">
                        <h3 class="text-xs font-bold text-gray-400">الوصف الاحترافي:</h3>
                        <button onclick="document.getElementById('promptInput').value=''" class="text-[10px] text-red-400 hover:underline">مسح الكل</button>
                    </div>
                    <textarea id="promptInput" rows="6" 
                        class="pro-input w-full p-5 text-sm bg-white/5 outline-none placeholder:text-gray-700 resize-none rounded-xl border border-white/10 transition-all leading-relaxed"
                        placeholder="ارفع الصور ثم اضغط 'إنشاء وصف احترافي'..."></textarea>

                    <button id="generateBtn" class="w-full py-5 turbo-gradient text-white rounded-xl font-black text-sm shadow-xl transition-all active:scale-[0.98] flex items-center justify-center gap-3">
                        <i class="fas fa-magic"></i> توليد النتائج الآن
                    </button>
                </div>

                <div id="loadingOverlay" class="hidden mt-6 p-4 bg-blue-600/10 border border-blue-500/20 rounded-xl flex items-center gap-4">
                    <div class="w-5 h-5 border-2 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                    <p id="statusText" class="text-[11px] text-blue-400 font-bold uppercase tracking-wider">جاري المعالجة...</p>
                </div>
            </div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </section>
    </main>

    <script type="module">
        const apiKey = ""; 
        let base64Images = [];
        let selectedCount = 1;

        const promptInput = document.getElementById('promptInput');
        const generateBtn = document.getElementById('generateBtn');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const imageUpload = document.getElementById('imageUpload');
        const previewGrid = document.getElementById('previewGrid');
        const imgCountDisplay = document.getElementById('imgCount');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const resultsGrid = document.getElementById('resultsGrid');
        const statusText = document.getElementById('statusText');

        document.querySelectorAll('.batch-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.batch-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedCount = parseInt(btn.getAttribute('data-count'));
            });
        });

        async function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (ev) => {
                    const img = new Image();
                    img.src = ev.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const size = 512;
                        canvas.width = size;
                        canvas.height = size * (img.height / img.width);
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                    };
                };
            });
        }

        imageUpload.onchange = async (e) => {
            const files = Array.from(e.target.files).slice(0, 4 - base64Images.length);
            for (const file of files) {
                const b64 = await compressImage(file);
                base64Images.push(b64);
                renderPreview(b64);
            }
            updateImageCount();
        };

        function renderPreview(b64) {
            const div = document.createElement('div');
            div.className = "img-slot group";
            div.innerHTML = `
                <img src="data:image/jpeg;base64,${b64}" class="w-full h-full object-cover">
                <button class="absolute top-1 right-1 w-5 h-5 bg-red-600 rounded-full text-white text-[10px] opacity-0 group-hover:opacity-100 transition-all">
                    <i class="fas fa-times"></i>
                </button>
            `;
            div.querySelector('button').onclick = () => {
                const index = base64Images.indexOf(b64);
                if (index > -1) base64Images.splice(index, 1);
                div.remove();
                updateImageCount();
            };
            previewGrid.prepend(div);
        }

        function updateImageCount() {
            imgCountDisplay.textContent = `${base64Images.length}/4`;
        }

        analyzeBtn.onclick = async () => {
            if (base64Images.length === 0) return alert("يرجى رفع صور أولاً.");
            loadingOverlay.classList.remove('hidden');
            statusText.textContent = "جاري إنشاء وصف تقني احترافي للصور...";
            
            try {
                const parts = [{ text: "Create an ultra-detailed technical image generation prompt based on these reference images. Describe lighting, professional skin textures, camera settings, and 8k photorealistic quality. Focus on high-end cinematic aesthetic. Output only the prompt." }];
                base64Images.forEach(img => parts.push({ inlineData: { mimeType: "image/jpeg", data: img } }));

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts }] })
                });
                const data = await response.json();
                promptInput.value = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
            } catch (err) { alert("حدث خطأ في التحليل."); }
            finally { loadingOverlay.classList.add('hidden'); }
        };

        async function fetchImageWithRetry(index, retries = 3) {
            const seed = Math.floor(Math.random() * 999999);
            const prompt = `8k photorealistic masterpiece, maintaining identity from reference image. Scene: ${promptInput.value}. Seed: ${seed}`;
            
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-image-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [
                                { text: prompt },
                                { inlineData: { mimeType: "image/jpeg", data: base64Images[0] } }
                            ] }],
                            generationConfig: { responseModalities: ['TEXT', 'IMAGE'] }
                        })
                    });

                    if (!response.ok) throw new Error("Request failed");
                    
                    const res = await response.json();
                    const imageData = res.candidates?.[0]?.content?.parts?.find(p => p.inlineData)?.inlineData?.data;
                    
                    if (imageData) return imageData;
                } catch (e) {
                    console.log(`Retry ${i+1} for image ${index}`);
                    await new Promise(r => setTimeout(r, 1000 * (i + 1))); // Exponential backoff
                }
            }
            return null;
        }

        generateBtn.onclick = async () => {
            if (base64Images.length === 0 || !promptInput.value) return alert("ارفع الصور وحللها أولاً.");
            
            loadingOverlay.classList.remove('hidden');
            resultsGrid.innerHTML = ''; // تنظيف النتائج السابقة
            
            // تنفيذ الطلبات بشكل متتابع مع فواصل زمنية بسيطة لضمان الاستقرار
            for (let i = 1; i <= selectedCount; i++) {
                statusText.textContent = `جاري توليد الصورة رقم ${i} من أصل ${selectedCount}...`;
                const imageData = await fetchImageWithRetry(i);
                
                if (imageData) {
                    renderResult(imageData);
                } else {
                    console.error(`Failed to generate image ${i}`);
                }
                
                // انتظار بسيط بين كل صورة وأخرى لتجنب حظر الـ API
                await new Promise(r => setTimeout(r, 500));
            }
            
            loadingOverlay.classList.add('hidden');
        };

        function renderResult(b64) {
            const div = document.createElement('div');
            div.className = "result-card glass-panel p-3 rounded-2xl relative group";
            div.innerHTML = `
                <img src="data:image/jpeg;base64,${b64}" class="w-full h-auto rounded-xl shadow-lg">
                <button class="absolute top-5 right-5 w-10 h-10 bg-black/60 backdrop-blur-md rounded-full text-white flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all hover:bg-blue-600">
                    <i class="fas fa-download text-xs"></i>
                </button>
            `;
            div.querySelector('button').onclick = () => {
                const a = document.createElement('a');
                a.href = `data:image/jpeg;base64,${b64}`;
                a.download = `8K_Pro_Image_${Date.now()}.jpg`;
                a.click();
            };
            resultsGrid.prepend(div);
        }
    </script>
</body>
</html>
